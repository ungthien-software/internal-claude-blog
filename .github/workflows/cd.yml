# Required GitHub Secrets:
#   SERVER_HOST       — server IP or hostname
#   SERVER_USER       — SSH login user (ubuntu)
#   SSH_PRIVATE_KEY   — private key whose public key is in server's authorized_keys
name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR=/home/ubuntu/ws/internal-claude-blog

            git -C "$DEPLOY_DIR" fetch --all
            git -C "$DEPLOY_DIR" reset --hard origin/main

            echo "Deploy complete."
